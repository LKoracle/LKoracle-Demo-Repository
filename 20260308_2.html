<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平安DO · AI智能工作台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f6fc;--bg-white:#ffffff;--bg-card:#ffffff;
  --blue-50:#eef5ff;--blue-100:#d9eaff;--blue-200:#b3d4ff;--blue-300:#7ab8ff;
  --blue-400:#4a9eff;--blue-500:#2180e8;--blue-600:#1a6ad4;--blue-700:#1354b0;
  --blue-800:#0e3f85;--blue-900:#0a2a5a;
  --text-primary:#1a2b42;--text-secondary:#4a6382;--text-muted:#8a9bb5;
  --border:#e2ecf5;--border-light:#edf3fa;
  --red:#e74c4c;--red-bg:#fef2f2;--red-border:#fecaca;
  --orange:#f59e0b;--orange-bg:#fffbeb;
  --green:#10b981;--green-bg:#ecfdf5;--green-border:#a7f3d0;
  --gold:#d97706;--gold-bg:#fffbeb;--gold-border:#fde68a;
  --shadow-sm:0 1px 3px rgba(10,42,90,.06);--shadow-md:0 4px 16px rgba(10,42,90,.08);
  --shadow-lg:0 12px 40px rgba(10,42,90,.12);--radius:12px;--radius-lg:16px;
}
body{font-family:'Noto Sans SC','DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg-white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:1000;box-shadow:var(--shadow-sm)}
.topbar-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:var(--blue-800)}
.topbar-brand .logo{width:30px;height:30px;background:linear-gradient(135deg,var(--blue-500),var(--blue-300));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-right .uname{font-size:13px;color:var(--text-secondary)}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--blue-400),var(--blue-300));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.app{padding-top:56px;display:flex;height:100vh}
.main{flex:1;overflow-y:auto;padding:24px 28px 60px;transition:all .35s cubic-bezier(.4,0,.2,1)}
.side{width:0;overflow:hidden;background:var(--bg-white);border-left:1px solid var(--border);transition:width .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(10,42,90,.04)}
.side.open{width:520px}
.side-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.side-head h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--blue-800)}
.side-close{width:28px;height:28px;border:none;border-radius:6px;background:var(--blue-50);color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.side-close:hover{background:var(--blue-100);color:var(--text-primary)}
.side-body{flex:1;overflow-y:auto;padding:20px}
.tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:8px 18px;border:1px solid var(--border);border-radius:20px;background:var(--bg-white);color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit;font-weight:500}
.tab:hover{border-color:var(--blue-300);color:var(--blue-600);background:var(--blue-50)}
.tab.on{background:var(--blue-500);border-color:var(--blue-500);color:#fff;box-shadow:0 2px 12px rgba(33,128,232,.25)}
.steps{display:flex;gap:2px;margin-bottom:24px;background:var(--blue-50);border-radius:10px;padding:4px}
.sbtn{flex:1;padding:10px 6px;border:none;border-radius:8px;background:transparent;color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;position:relative}
.sbtn:hover{color:var(--text-secondary);background:rgba(255,255,255,.6)}
.sbtn.on{background:#fff;color:var(--blue-600);box-shadow:var(--shadow-sm);font-weight:700}
.sbtn.ok{color:var(--green)}.sbtn.ok::after{content:'✓';position:absolute;top:2px;right:6px;font-size:9px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;opacity:0;transform:translateY(16px);animation:fu .45s ease forwards;box-shadow:var(--shadow-sm)}
.kpi:nth-child(1){animation-delay:.08s}.kpi:nth-child(2){animation-delay:.18s}.kpi:nth-child(3){animation-delay:.28s}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue-400),var(--blue-300))}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.kpi-label{font-size:12px;color:var(--text-muted);margin-bottom:8px;font-weight:500;letter-spacing:.3px}
.kpi-val{font-size:30px;font-weight:900;color:var(--blue-800);letter-spacing:-1px}
.kpi-val span{font-size:14px;font-weight:400;color:var(--text-muted)}
.kpi-sub{font-size:12px;color:var(--text-secondary);margin-top:6px;display:flex;align-items:center;gap:4px}
.up{color:var(--green);font-weight:600}.ok2{color:var(--green);font-weight:600}
.pbar{height:4px;background:var(--blue-50);border-radius:4px;margin-top:10px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue-400),var(--green));border-radius:4px;width:0;animation:pg 1s .5s ease forwards}
@keyframes pg{to{width:var(--w)}}
.ai-think{background:var(--blue-50);border:1px solid var(--blue-100);border-left:3px solid var(--blue-400);border-radius:var(--radius);padding:16px 18px;margin:14px 0;font-size:13px;line-height:1.8;color:var(--text-secondary)}
.ai-think-hd{font-size:11px;font-weight:700;color:var(--blue-500);margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:.5px}
.ai-think-hd .dot{width:6px;height:6px;border-radius:50%;background:var(--blue-400);animation:dp 1.2s ease infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}
.ai-think.done .ai-think-hd .dot{animation:none;background:var(--green)}
.ai-think.done .ai-think-hd{color:var(--green)}
.tl{opacity:0;margin-bottom:3px}.tl.v{opacity:1;animation:ti .25s ease}
@keyframes ti{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
.cur{display:inline-block;width:2px;height:13px;background:var(--blue-400);vertical-align:middle;margin-left:2px;animation:bk .7s step-end infinite}
@keyframes bk{50%{opacity:0}}
.blk{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px;box-shadow:var(--shadow-sm);opacity:0;transform:translateY(12px);animation:fu .4s ease forwards}
.blk-t{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--blue-800)}
.blk-t .ico{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--blue-500),var(--blue-300));display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-p{background:linear-gradient(135deg,var(--blue-500),var(--blue-400));color:#fff;box-shadow:0 2px 12px rgba(33,128,232,.2)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(33,128,232,.3)}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--orange));color:#fff;box-shadow:0 2px 12px rgba(217,119,6,.2)}
.btn-gn{background:linear-gradient(135deg,#059669,var(--green));color:#fff;box-shadow:0 2px 12px rgba(16,185,129,.2)}
.btn-r{background:linear-gradient(135deg,#dc2626,var(--red));color:#fff;box-shadow:0 2px 12px rgba(231,76,76,.2)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn:active{transform:scale(.98)}
.sl{font-size:11px;font-weight:700;color:var(--blue-500);letter-spacing:.8px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border-light);text-transform:uppercase}
.ri{font-size:13px;line-height:1.8;color:var(--text-secondary);padding-left:12px;border-left:2px solid transparent;margin-bottom:2px}
.ri.dg{border-left-color:var(--red);color:#b91c1c;background:var(--red-bg);padding:4px 12px;border-radius:0 6px 6px 0}
.ri.wn{border-left-color:var(--orange);background:var(--orange-bg);padding:4px 12px;border-radius:0 6px 6px 0}
.rs{margin-bottom:16px}
.st{background:var(--blue-50);border:1px solid var(--blue-100);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.st-t{font-size:13px;font-weight:700;color:var(--blue-700);margin-bottom:8px}
.st .talk{font-size:13px;line-height:1.8;color:var(--text-secondary);padding:12px 16px;background:#fff;border-radius:8px;border-left:3px solid var(--blue-300);margin-top:8px}
.tk{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:10px;margin-bottom:8px;font-size:13px}
.tk-c{width:20px;height:20px;flex-shrink:0;border:2px solid var(--green);border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--green);font-size:11px;font-weight:700}
.tk-b{flex:1}.tk-b .tt{font-weight:600;color:var(--text-primary);margin-bottom:2px}.tk-b .tm{font-size:11px;color:var(--text-muted)}
.done-b{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;color:#047857;font-size:13px;font-weight:600;margin-top:12px}
.alert-m{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,42,90,.25);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.alert-m.show{opacity:1;pointer-events:all}
.alert-b{background:#fff;border:1px solid var(--red-border);border-radius:var(--radius-lg);padding:30px 34px;max-width:480px;width:90%;box-shadow:0 0 0 4px rgba(231,76,76,.08),var(--shadow-lg);transform:scale(.92);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.alert-m.show .alert-b{transform:scale(1)}
.al-i{font-size:32px;margin-bottom:12px}
.al-t{font-size:15px;font-weight:700;color:var(--red);margin-bottom:8px}
.al-msg{font-size:13px;line-height:1.7;color:var(--text-secondary);margin-bottom:20px}
.chat{display:flex;flex-direction:column;gap:12px}
.bub{max-width:88%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.7;opacity:0;animation:bi .3s ease forwards}
@keyframes bi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bub.ai{background:var(--blue-50);border:1px solid var(--blue-100);align-self:flex-start;border-bottom-left-radius:4px;color:var(--text-secondary)}
.bub.usr{background:var(--blue-500);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bub .sn{font-size:11px;font-weight:700;margin-bottom:4px;color:var(--blue-500)}
.bub.usr .sn{color:rgba(255,255,255,.8)}
.gold-bn{background:linear-gradient(135deg,var(--gold-bg),#fff7ed);border:1px solid var(--gold-border);border-radius:var(--radius-lg);padding:28px;text-align:center;margin:16px 0}
.gold-bn .tr{font-size:48px;margin-bottom:8px}
.gold-bn h2{font-size:18px;font-weight:900;color:var(--gold);margin-bottom:4px}
.gold-bn p{font-size:13px;color:var(--text-secondary)}
.vi{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:var(--radius);margin:10px 0}
.mic{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.mic.rec{background:var(--red);animation:mp 1.5s ease infinite}
@keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(231,76,76,.3)}50%{box-shadow:0 0 0 10px rgba(231,76,76,0)}}
.vw{display:flex;align-items:center;gap:2px;height:20px}
.vw .b{width:3px;border-radius:3px;background:var(--blue-400);animation:wa .5s ease-in-out infinite alternate}
@keyframes wa{from{height:3px}to{height:18px}}
.vw .b:nth-child(1){animation-delay:0s}.vw .b:nth-child(2){animation-delay:.08s}.vw .b:nth-child(3){animation-delay:.16s}.vw .b:nth-child(4){animation-delay:.04s}.vw .b:nth-child(5){animation-delay:.12s}
.pw{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:10px;margin-bottom:8px}
.pw .bars{display:flex;align-items:center;gap:2px;height:22px}
.pw .b{width:3px;border-radius:3px;background:var(--green);animation:wa .5s ease-in-out infinite alternate}
.pw .lb{font-size:13px;color:var(--text-secondary)}
.ppt{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:10px;margin-bottom:8px}
.ppt-n{width:36px;height:36px;flex-shrink:0;background:var(--blue-500);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.ppt-d{font-size:13px;color:var(--text-secondary)}
.cal{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;margin:10px 0;font-size:12px;color:#047857}
.cal .ci{font-size:20px}
.scene-t{font-size:22px;font-weight:900;color:var(--blue-900);margin-bottom:4px;letter-spacing:-.5px}
.scene-s{font-size:13px;color:var(--text-muted);margin-bottom:22px}
.atag{display:inline-block;padding:2px 8px;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:4px;font-size:11px;color:var(--blue-500);margin-left:4px;font-weight:600}
.ai-fab{position:fixed;bottom:24px;right:24px;width:50px;height:50px;background:linear-gradient(135deg,var(--blue-500),var(--blue-300));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(33,128,232,.3);cursor:pointer;z-index:999;border:none;color:#fff;transition:all .2s}
.ai-fab:hover{transform:scale(1.08)}
.ai-fab .nf{position:absolute;top:-3px;right:-3px;width:18px;height:18px;background:var(--red);border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;animation:pu 1.5s ease infinite}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.cs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);margin-bottom:5px}
.cs .ck{color:var(--green);font-weight:700}
.hid{display:none!important}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--blue-100);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><div class="logo">DO</div><span>平安DO · AI智能工作台</span></div>
  <div class="topbar-right"><span class="uname">营业区经理 赵虎</span><div class="avatar">赵</div></div>
</div>

<div class="alert-m" id="AM">
  <div class="alert-b">
    <div class="al-i">🚨</div>
    <div class="al-t" id="AT"></div>
    <div class="al-msg" id="AMsg"></div>
    <button class="btn btn-p" id="ABtn" onclick="closeA()">查看详情 ➤</button>
  </div>
</div>

<div class="app">
  <div class="main" id="M">
    <div class="tabs" id="tabs">
      <button class="tab on" onclick="go(1)">场景一 · 智能巡检雷达</button>
      <button class="tab" onclick="go(2)">场景二 · 智能面谈</button>
      <button class="tab" onclick="go(3)">场景三 · 人机对话运营</button>
      <button class="tab" onclick="go(4)">场景四 · 进度追踪闭环</button>
    </div>
    <div id="C"></div>
  </div>
  <div class="side" id="S">
    <div class="side-head"><h3 id="ST">🤖 AI 助手</h3><button class="side-close" onclick="csid()">✕</button></div>
    <div class="side-body" id="SB"></div>
  </div>
</div>

<button class="ai-fab" id="fab" onclick="hFab()">🤖<span class="nf hid" id="nf">1</span></button>

<script>
let sc=0,sp=0,T=[],aCb=null;
function clr(){T.forEach(t=>clearTimeout(t));T=[]}
function showA(t,m,b,cb){$('AT').textContent=t;$('AMsg').textContent=m;$('ABtn').textContent=b||'查看详情 ➤';aCb=cb;$('AM').classList.add('show')}
function closeA(){$('AM').classList.remove('show');if(aCb){aCb();aCb=null}}
function osid(t,h){$('ST').innerHTML=t;$('SB').innerHTML=h;$('S').classList.add('open')}
function csid(){$('S').classList.remove('open')}
function $(id){return document.getElementById(id)}

function anim(id,n,cb){
  const el=$(id);if(!el)return;let i=0;const cur=el.querySelector('.cur');
  function nx(){
    if(i>=n){if(cur)cur.remove();el.classList.add('done');if(cb)cb();return}
    const ln=el.querySelectorAll('.tl')[i];
    if(ln){ln.classList.add('v');if(cur&&ln.nextSibling!==cur)ln.parentNode.insertBefore(cur,ln.nextSibling)}
    i++;const t=setTimeout(nx,500+Math.random()*400);T.push(t);
  }
  const t=setTimeout(nx,350);T.push(t);
}

function mkS(labels,active){
  return `<div class="steps">${labels.map((s,i)=>`<button class="sbtn ${i+1===active?'on':''} ${i+1<active?'ok':''}" onclick="jmp(${i+1})">${s}</button>`).join('')}</div>`;
}
function jmp(n){clr();sp=n;render()}
function go(n){clr();csid();sc=n;sp=1;document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===n-1));$('nf').classList.add('hid');render()}
function render(){switch(sc){case 1:r1();break;case 2:r2();break;case 3:r3();break;case 4:r4();break}}

// ====== SCENE 1 ======
function r1(){
  $('C').innerHTML=`
    <div class="scene-t">智能巡检雷达</div>
    <div class="scene-s">AI主动发现问题，而非等你来看 <span class="atag">管理智能体</span></div>
    ${mkS(['STEP 1 · 数据加载与巡检','STEP 2 · 异常预警','STEP 3 · 诊断报告'],sp)}
    <div id="c1"></div>`;
  r1s();
}
function r1s(){
  const c=$('c1');
  if(sp===1){
    c.innerHTML=`
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">本月NBEV · 当日新增</div><div class="kpi-val">10<span>万</span></div><div class="pbar"><div class="pfill" style="--w:65%"></div></div><div class="kpi-sub">达成进度 65%</div></div>
        <div class="kpi"><div class="kpi-label">本月NBEV · 累计达成</div><div class="kpi-val">200<span>万</span></div><div class="kpi-sub"><span class="up">↑ 12%</span> 环比增长</div></div>
        <div class="kpi"><div class="kpi-label">有效活动率</div><div class="kpi-val">50<span>%</span></div><div class="kpi-sub"><span class="ok2">✅ 达标</span></div></div>
      </div>
      <div class="ai-think" id="t1">
        <div class="ai-think-hd"><span class="dot"></span> AI 推理中…</div>
        <div class="tl">▸ 后台并行执行——扫描8个营业部×12项指标 = 96个数据点，交叉比对基准线、环比、同比…</div>
        <div class="tl">▸ 发现异常簇：阳光部人均FYC和有效活动率同时偏离基准线，且连续5日下滑无回弹——判定为"结构性异常"而非波动噪声</div>
        <div class="tl">▸ 进一步关联分析：该部出勤率、1V1扫码量、1VN参与率三项行为指标均同步下降</div>
        <div class="tl">▸ 综合判断为"团队行为塔基崩溃"——非单一指标波动</div>
        <span class="cur"></span>
      </div>`;

function rChat(el,items){
  let tot=0;
  items.forEach(it=>{
    tot+=it.d;
    const t=setTimeout(()=>{
      el.insertAdjacentHTML('beforeend',it.h);
      el.scrollIntoView({behavior:'smooth',block:'end'});
      if(it.tk)anim(it.tk,it.tc);
    },tot);
    T.push(t);
  });
}
